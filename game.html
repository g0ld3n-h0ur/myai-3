<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="refresh" content="0; url=login.html">
<script>window.location.replace("login.html");</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Experience</title>

<style>
.screen { display: none; }
.screen.active { display: block; }
</style>
</head>

<body>

<!-- 🎶 GLOBAL MUSIC (only once) -->
<audio id="bgMusic" src="music1.mp3" loop></audio>

<!-- SCREENS -->
<div id="maze" class="screen active">
    <iframe src="maze.html" style="width:100%; height:100vh;"></iframe>
</div>
<div id="word" class="screen">
    <iframe src="wordsearch.html" style="width:100%; height:100vh;"></iframe>
</div>
<div id="crypto" class="screen">
    <iframe src="secret.html" style="width:100%; height:100vh;"></iframe>
</div>
<div id="treasure" class="screen">
    <iframe src="treasure.html" style="width:100%; height:100vh;"></iframe>
</div>

<script>
let started = false;

function startMusic(){
  if(started) return;
  started = true;
  bgMusic.volume = 0.3;
  bgMusic.play().catch(()=>{});
}

document.body.addEventListener("click", startMusic, {once:true});

function goToScreen(current, next){
  document.getElementById(current).classList.remove("active");
  document.getElementById(next).classList.add("active");
}
</script>

</body>
</html>
